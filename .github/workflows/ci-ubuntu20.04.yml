name: CI Ubuntu 20.04

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Linux architecture to build"
        type: choice
        default: x64
        options: [x64, arm64, all]

env:
  NODE_VERSION: "24"
  UBUNTU_2004_IMAGE: "ubuntu:20.04"

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - name: Select Linux build matrix
        id: matrix
        run: |
          x64='{"arch":"x64","runner":"ubuntu-latest","docker-platform":"linux/amd64"}'
          arm64='{"arch":"arm64","runner":"ubuntu-24.04-arm","docker-platform":"linux/arm64"}'

          case "${{ inputs.arch }}" in
            x64)
              matrix="{\"include\":[${x64}]}"
              ;;
            arm64)
              matrix="{\"include\":[${arm64}]}"
              ;;
            all)
              matrix="{\"include\":[${x64},${arm64}]}"
              ;;
            *)
              echo "Unsupported arch: ${{ inputs.arch }}" >&2
              exit 1
              ;;
          esac

          echo "build_matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.build_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build deb in Ubuntu 20.04 container
        run: |
          docker run --rm \
            --platform "${{ matrix.docker-platform }}" \
            -v "$PWD:/work" \
            -w /work \
            -e NODE_VERSION="${{ env.NODE_VERSION }}" \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            "${{ env.UBUNTU_2004_IMAGE }}" \
            bash scripts/ci-ubuntu2004-linux-build.sh "${{ matrix.arch }}"

      - name: Stage deb artifact
        run: |
          version="$(node -p "require('./package.json').version")"
          case "${{ matrix.arch }}" in
            x64) deb_arch="amd64" ;;
            arm64) deb_arch="arm64" ;;
            *)
              echo "Unsupported arch: ${{ matrix.arch }}" >&2
              exit 1
              ;;
          esac

          mkdir -p release-assets
          deb_path="$(find out/make/deb -type f -name '*.deb' | head -n 1)"
          if [ -z "$deb_path" ]; then
            echo "No deb package found" >&2
            exit 1
          fi

          cp "$deb_path" "release-assets/codex_${version}_ubuntu20.04_${deb_arch}.deb"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Codex-Linux-Ubuntu-20.04-${{ matrix.arch }}
          path: release-assets/*.deb
          if-no-files-found: error
          retention-days: 1
