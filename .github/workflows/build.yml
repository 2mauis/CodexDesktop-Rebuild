name: Build & Release (Manual)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: false
        default: "linux"
        type: choice
        options: [linux]

env:
  NODE_VERSION: "24"

jobs:
  build-linux:
    if: inputs.platform == 'linux'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          npm ci
      - run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg 7zip
      - run: node scripts/sync-upstream.js --force --skip-win
      - run: node scripts/patch-all.js mac-${{ matrix.arch }}
      - run: npm run build:linux-${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-Linux-${{ matrix.arch }}-deb
          path: out/make/deb/**/*.deb
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-Linux-${{ matrix.arch }}
          path: |
            out/make/deb/**/*.deb
            out/make/rpm/**/*.rpm
            out/make/zip/**/*.zip
          if-no-files-found: error
