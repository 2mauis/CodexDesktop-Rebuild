name: CI

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even without version change"
        type: boolean
        default: false
      arch:
        description: "Linux architecture to build"
        type: choice
        default: x64
        options: [x64, arm64, all]

env:
  NODE_VERSION: "24"
  UBUNTU_2004_IMAGE: "ubuntu:20.04"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.detect.outputs.has_update }}
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check upstream versions
        id: detect
        run: |
          set +e
          node scripts/check-update.js --json --force 2>&1
          exit_code=$?
          set -e

          if [ "${{ inputs.force }}" = "true" ]; then
            echo "has_update=true" >> "$GITHUB_OUTPUT"
          elif [ $exit_code -eq 0 ]; then
            echo "has_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            echo "No upstream update detected."
          fi

      - name: Select Linux build matrix
        id: matrix
        run: |
          case "${{ inputs.arch }}" in
            x64)
              matrix='{"include":[{"arch":"x64","runner":"ubuntu-latest","docker-platform":"linux/amd64"}]}'
              ;;
            arm64)
              matrix='{"include":[{"arch":"arm64","runner":"ubuntu-24.04-arm","docker-platform":"linux/arm64"}]}'
              ;;
            all)
              matrix='{"include":[{"arch":"x64","runner":"ubuntu-latest","docker-platform":"linux/amd64"},{"arch":"arm64","runner":"ubuntu-24.04-arm","docker-platform":"linux/arm64"}]}'
              ;;
            *)
              echo "Unsupported arch: ${{ inputs.arch }}" >&2
              exit 1
              ;;
          esac

          echo "build_matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.check.outputs.build_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build deb in Ubuntu 20.04 container
        run: |
          docker run --rm \
            --platform "${{ matrix.docker-platform }}" \
            -v "$PWD:/work" \
            -w /work \
            -e NODE_VERSION="${{ env.NODE_VERSION }}" \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            "${{ env.UBUNTU_2004_IMAGE }}" \
            bash scripts/ci-ubuntu2004-linux-build.sh "${{ matrix.arch }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Codex-Linux-${{ matrix.arch }}
          path: out/make/deb/**/*.deb
          if-no-files-found: error
          retention-days: 1

  # ──────────────────────────────────────────────
  # Bump version + tag + release
  # ──────────────────────────────────────────────
  release:
    needs: [build-linux]
    if: needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Get upstream version and tag
        id: version
        run: |
          RESULT=$(node scripts/check-update.js --json --force)
          MAC_ARM64=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.['macOS-arm64']?.version||'')}catch{console.log('')}})")
          MAC_X64=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.['macOS-x64']?.version||'')}catch{console.log('')}})")
          WIN_VER=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.Windows?.version||'')}catch{console.log('')}})")

          VERSION="${MAC_ARM64:-${MAC_X64:-$WIN_VER}}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "mac_arm64=$MAC_ARM64" >> "$GITHUB_OUTPUT"
          echo "mac_x64=$MAC_X64" >> "$GITHUB_OUTPUT"
          echo "win_version=$WIN_VER" >> "$GITHUB_OUTPUT"

          if [ -z "$VERSION" ]; then echo "No version detected"; exit 0; fi

          node -e "
            const fs=require('fs'), p=JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version='$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json
          git diff --cached --quiet && echo "No version change" && exit 0

          git commit -m "Bump version to ${VERSION}"
          git tag -a "v${VERSION}" -m "Codex ${VERSION}"
          git push origin HEAD --tags

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Display structure
        run: ls -lhR artifacts/

      - name: Create Release
        if: steps.version.outputs.version != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Codex ${{ steps.version.outputs.version }}
          body: |
            ## Upstream Versions
            | Platform | Version |
            |----------|---------|
            | macOS arm64 | `${{ steps.version.outputs.mac_arm64 || 'N/A' }}` |
            | macOS x64 | `${{ steps.version.outputs.mac_x64 || 'N/A' }}` |
            | Windows x64 | `${{ steps.version.outputs.win_version || 'N/A' }}` |
            | Linux x64 | Ubuntu 20.04 deb |
            | Linux arm64 | Ubuntu 20.04 deb |
          files: |
            artifacts/**/*.deb
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
