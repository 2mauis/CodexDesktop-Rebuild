name: CI

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even without version change"
        type: boolean
        default: false
      arch:
        description: "Linux architecture to build"
        type: choice
        default: x64
        options: [x64, arm64, all]

env:
  NODE_VERSION: "24.11.0"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.detect.outputs.has_update }}
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check upstream versions
        id: detect
        run: |
          set +e
          node scripts/check-update.js --json --force 2>&1
          exit_code=$?
          set -e

          if [ "${{ inputs.force }}" = "true" ]; then
            echo "has_update=true" >> "$GITHUB_OUTPUT"
          elif [ $exit_code -eq 0 ]; then
            echo "has_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            echo "No upstream update detected."
          fi

      - name: Select Linux build matrix
        id: matrix
        run: |
          x64='{"arch":"x64","runner":"ubuntu-latest"}'
          arm64='{"arch":"arm64","runner":"ubuntu-24.04-arm"}'

          case "${{ inputs.arch }}" in
            x64)
              matrix="{\"include\":[${x64}]}"
              ;;
            arm64)
              matrix="{\"include\":[${arm64}]}"
              ;;
            all)
              matrix="{\"include\":[${x64},${arm64}]}"
              ;;
            *)
              echo "Unsupported arch: ${{ inputs.arch }}" >&2
              exit 1
              ;;
          esac

          echo "build_matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.check.outputs.build_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg

      - name: Install dependencies
        run: npm ci

      - name: Sync upstream (macOS ZIP for unix, skip Windows)
        run: node scripts/sync-upstream.js --force --skip-win

      - name: Build deb on GitHub runner
        run: npm run build:linux-${{ matrix.arch }}

      - name: Stage deb artifact
        run: node scripts/stage-linux-deb.js --arch "${{ matrix.arch }}" --ubuntu 24.04

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Codex-Linux-${{ matrix.arch }}
          path: release-assets/*.deb
          if-no-files-found: error
          retention-days: 1

  # ──────────────────────────────────────────────
  # Bump version + tag + release
  # ──────────────────────────────────────────────
  release:
    needs: [build-linux]
    if: needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Get upstream version and tag
        id: version
        run: |
          RESULT=$(node scripts/check-update.js --json --force)
          MAC_ARM64=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.['macOS-arm64']?.version||'')}catch{console.log('')}})")
          MAC_X64=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.['macOS-x64']?.version||'')}catch{console.log('')}})")
          WIN_VER=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.Windows?.version||'')}catch{console.log('')}})")

          VERSION="${MAC_ARM64:-${MAC_X64:-$WIN_VER}}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "mac_arm64=$MAC_ARM64" >> "$GITHUB_OUTPUT"
          echo "mac_x64=$MAC_X64" >> "$GITHUB_OUTPUT"
          echo "win_version=$WIN_VER" >> "$GITHUB_OUTPUT"

          if [ -z "$VERSION" ]; then echo "No version detected"; exit 0; fi

          node -e "
            const fs=require('fs'), p=JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version='$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json
          git diff --cached --quiet && echo "No version change" && exit 0

          git commit -m "Bump version to ${VERSION}"
          git tag -a "v${VERSION}" -m "Codex ${VERSION}"
          git push origin HEAD --tags

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Display structure
        run: ls -lhR artifacts/

      - name: Write Release notes
        if: steps.version.outputs.version != ''
        run: |
          cat > release-notes.md <<'EOF'
          ## Linux deb packages

          This release publishes Linux `.deb` packages only.

          | Package | Build target |
          |---------|--------------|
          | `codex_*_ubuntu24.04_amd64.deb` | Ubuntu 24.04 x64 |
          | `codex_*_ubuntu24.04_arm64.deb` | Ubuntu 24.04 arm64 |

          ## Upstream Versions

          | Platform | Version |
          |----------|---------|
          | macOS arm64 | `${{ steps.version.outputs.mac_arm64 || 'N/A' }}` |
          | macOS x64 | `${{ steps.version.outputs.mac_x64 || 'N/A' }}` |
          | Windows x64 | `${{ steps.version.outputs.win_version || 'N/A' }}` |
          EOF

      - name: Create Release
        if: steps.version.outputs.version != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Codex ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: |
            artifacts/**/*.deb
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize Release
        if: steps.version.outputs.version != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: v${{ steps.version.outputs.version }}
        run: |
          gh release edit "${TAG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --notes-file release-notes.md

          release_id="$(gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --json databaseId --jq '.databaseId')"
          gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets" \
            --jq '.[] | select((.name | endswith(".deb") | not) or (.name | test("_ubuntu[0-9]+[.][0-9]+_(amd64|arm64)[.]deb$") | not)) | [.id,.name] | @tsv' |
          while IFS=$'\t' read -r asset_id asset_name; do
            [ -n "$asset_id" ] || continue
            echo "Deleting non-deb release asset: $asset_name"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
          done
